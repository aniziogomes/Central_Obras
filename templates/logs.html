{% extends "base.html" %}

{% block title %}Logs do Sistema{% endblock %}

{% block content %}
<div class="hdr">
    <h1>Logs do Sistema</h1>
</div>

<div class="card">
    <div class="tbl-wrap">
        <table>
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Ação</th>
                    <th>Entidade</th>
                    <th>Descrição</th>
                </tr>
            </thead>
            <tbody>
                {% for log in logs %}
                <tr>
                    <td>{{ log.data_hora }}</td>
                    <td>{{ log.acao }}</td>
                    <td>{{ log.entidade }}</td>
                    <td>{{ log.descricao }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
