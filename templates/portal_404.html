<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Link inválido — Central de Obras</title>
  <style>
    :root {
      --bg: #0d0d0f;
      --bg2: #141416;
      --border: rgba(255, 255, 255, .07);
      --text: #f0f0f0;
      --text2: #8a8a95;
      --or: #e8621a;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .box {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 32px;
      max-width: 380px;
      width: 100%;
      text-align: center;
    }

    .ico {
      width: 56px;
      height: 56px;
      background: rgba(232, 98, 26, .12);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }

    h1 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    p {
      font-size: 13px;
      color: var(--text2);
      line-height: 1.6;
    }
  </style>
</head>

<body>
  <div class="box">
    <div class="ico">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#e8621a" stroke-width="2"
        stroke-linecap="round">
        <circle cx="12" cy="12" r="10" />
        <line x1="12" y1="8" x2="12" y2="12" />
        <line x1="12" y1="16" x2="12.01" y2="16" />
      </svg>
    </div>
    <h1>Link não encontrado</h1>
    <p>Este link de acompanhamento não existe ou foi desativado pelo
      Administrador responsável.<br><br>
      Entre em contato com o responsável pela sua obra para receber
      um novo link.</p>
  </div>
</body>

</html>
