<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal indisponível - Central de Obras</title>
  <style>
    :root {
      --bg: #11141b;
      --bg2: #1b202b;
      --border: rgba(255, 255, 255, .08);
      --text: #f4f6fb;
      --text2: #aab3c3;
      --orange: #e8621a;
      --orange2: #ff8a4a;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--text);
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at 20% 0%, rgba(47, 125, 240, .16), transparent 34%),
        linear-gradient(180deg, #10141c 0%, #151923 100%);
    }

    .box {
      width: min(420px, 100%);
      padding: 28px;
      text-align: center;
      border: 1px solid var(--border);
      border-radius: 14px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .035), rgba(255, 255, 255, .010)),
        var(--bg2);
      box-shadow: 0 18px 42px rgba(0, 0, 0, .28);
    }

    .ico {
      width: 52px;
      height: 52px;
      display: grid;
      place-items: center;
      margin: 0 auto 18px;
      border: 1px solid rgba(232, 98, 26, .30);
      border-radius: 14px;
      color: var(--orange2);
      background: rgba(232, 98, 26, .11);
    }

    h1 {
      margin-bottom: 8px;
      font-size: 20px;
      line-height: 1.2;
    }

    p {
      color: var(--text2);
      font-size: 13px;
      line-height: 1.65;
    }
  </style>
</head>

<body>
  <main class="box">
    <div class="ico">
      <svg width="25" height="25" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10" />
        <path d="M12 8v4" />
        <path d="M12 16h.01" />
      </svg>
    </div>
    <h1>Portal indisponível</h1>
    <p>Este link de acompanhamento não existe ou foi desativado. Solicite um novo acesso ao responsável pela obra.</p>
  </main>
</body>

</html>
